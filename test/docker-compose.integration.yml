networks:
  test-net:
    driver: bridge

volumes:
  test-data:

services:
  server:
    build:
      context: ..
      dockerfile: test/Dockerfile.server
    environment:
      - CROSSTALK_CONFIG=/app/test.json
      - CROSSTALK_TEST_MODE=1
    ports:
      - "18080:8080"
    volumes:
      - test-data:/data
    networks:
      test-net:
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  test-runner:
    build:
      context: ..
      dockerfile: test/Dockerfile.test
    depends_on:
      server:
        condition: service_healthy
    environment:
      - CT_SERVER_URL=http://server:8080
    networks:
      test-net:
