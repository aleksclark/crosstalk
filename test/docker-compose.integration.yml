version: "3.8"

networks:
  test-net:
    driver: bridge

services:
  server:
    build:
      context: ..
      dockerfile: test/Dockerfile.server
    environment:
      - CROSSTALK_CONFIG=/app/test.json
      - CROSSTALK_TEST_MODE=1
    ports:
      - "18080:8080"
    networks:
      test-net:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/", "||", "true"]
      interval: 2s
      timeout: 5s
      retries: 30

  test-runner:
    build:
      context: ..
      dockerfile: test/Dockerfile.test
    depends_on:
      server:
        condition: service_healthy
    environment:
      - CT_SERVER_URL=http://server:8080
    networks:
      test-net:
