name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint server
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: server

      - name: golangci-lint cli
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: cli

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: web

      - name: ESLint
        run: pnpm run lint
        working-directory: web

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test server
        run: go test -count=1 -timeout 120s ./...
        working-directory: server

      - name: Test cli
        run: go test -count=1 -timeout 60s ./...
        working-directory: cli

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Vitest
        run: pnpm test run
        working-directory: web

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build web
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build server
        working-directory: server
        run: CGO_ENABLED=1 go build -o ../bin/ct-server ./cmd/ct-server

      - name: Build CLI
        working-directory: cli
        run: go build -o ../bin/ct-client ./cmd/ct-client

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web (needed for embed)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Go integration tests
        working-directory: server
        run: go test -count=1 -timeout 120s -v ./cmd/ct-server/... -run TestIntegration

      - name: Playwright integration tests
        run: |
          docker compose -f test/docker-compose.integration.yml build
          docker compose -f test/docker-compose.integration.yml up -d --wait
          docker compose -f test/docker-compose.integration.yml run --rm test-runner
          docker compose -f test/docker-compose.integration.yml down -v
