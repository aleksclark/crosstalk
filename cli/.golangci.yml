version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-QF1003"
        - "-ST1000"
        - "-ST1003"
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unused

formatters:
  enable: []
